<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel="stylesheet">
</head>
<body>

    <div class="wrapper">
        <div class="form-box login">
            <h2 class="animation">S'inscrire</h2>
            <form action="#">
                <div class="input-box animation">
                    <input type="text" id="name" name="Nom" required>
                    <label>Nom et prenoms</label>
                    <i class="bx bxs-user"></i>
                </div>
                <div class="input-box animation">
                    <input type="text and number" id="fone" name="Téléphone" required>
                    <label>Téléphone ou e-mail</label>
                    <i class="bx bx-lock"></i>
                </div>
                <div class="input-box animation">
                    <input type="Text" id="pseudo" name="Pseudo" required>
                    <label>Pseudo</label>
                    <i class="bx bx-lock"></i>
                </div>
                <div class="input-box animation">
                    <input type="password" id="mdp" name="Mot de passe" required>
                    <label>Mot de passe</label>
                    <i class="bx bx-lock"></i>
                </div>
                <div class="input-box animation">
                    <input type="password" id="mdp" name="Mot de passe" required>
                    <label>Répétez votre mot de passe</label>
                    <i class="bx bx-lock"></i>
                </div>
                <button type="submit" class="btn animation">S'inscrire</button>
                <div class="logreg-link animation">
                    <p>Vous avez deja un compte? <a href="./connect/index.html" class="register-link">Connectez-vous</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
